<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<script>
$(function(){
	var xhr = new XMLHttpRequest();
	$('#btn1').click(function(){
		xhr.open('get', 'lprod.jsp', true);
		xhr.send();
		
		xhr.onreadystatechange = function(){
			if(this.readyState == 4 && this.status == 200){
				res = JSON.parse(this.responseText);
				
				str = `
					<table border='1' class="table table-dark table-hover"> <br>
						<tr>
							<td>LPROD_ID</td>
							<td>LPROD_GU</td>
							<td>LPROD_NM</td>
						</tr>
				`;
				
				$.each(res,function(i,v){
					str += `
						<tr>
							<td>${v.lprod_id}</td>
							<td>${v.lprod_gu}</td>
							<td>${v.lprod_nm}</td>
						</tr>
					`;	
				})
				
				str += "</table>";
				
				$('#result1').html(str);
			}
		}
	})
	
	$('#btn2').click(function(){
		$.ajax({
			url : '/jqueryWeb/LprodServlet.do',
			type : 'get',
			success : function(res){
				str = `
					<table border='1' class="table table-dark table-hover"> <br>
						<tr>
							<td>LPROD_ID</td>
							<td>LPROD_GU</td>
							<td>LPROD_NM</td>
						</tr>
				`;
				
				$.each(res,function(i,v){
					str += `
						<tr>
							<td>${v.lprod_id}</td>
							<td>${v.lprod_gu}</td>
							<td>${v.lprod_nm}</td>
						</tr>
					`;	
				})
				
				str += "</table>";
				
				$('#result2').html(str);
			},
			error : function(xhr){
				alert("상태 : " + xhr.status);
			},
			dataType : 'json'
		})
	})
})
</script>
</head>
<body>

<div id="box">
	<input type="button" id="btn1" value="lprodList">
	<div id="result1"></div>
</div>
<div id="box">
	<input type="button" id="btn2" value="lprodList">
	<div id="result2"></div>
</div>
</body>
</html>
