<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<script>
$(function(){
	$('#btn1').click(function(){
		$.ajax({
			url : '/jqueryWeb/LprodServlet.do',
			type : 'get',
			success : function(res){
				str = "";
				
				$.each(res, function(i,v){
					str += "<option value='" + v.lprod_gu+"'> " + v.lprod_nm + "</option>";
				})
				
				$('#lprod').html(str);
				$('#lprod').trigger('change');
				
			},
			error : function(xhr){
				alert("상태 : " + xhr.status);
			},
			dataType : 'json'
		})
	})
	
	$('#lprod').on('change', function(){
		var lprod_gu = $('option:selected', this).val();
		
		$.ajax({
			url : '/jqueryWeb/ProdControllerSW.do',
			data : {"lgu" : lprod_gu},
			type : 'get',
			success : function(res){
				str = "";
				
				if(res.sw == "ok"){					
					$.each(res.datas, function(i,v){
						str += "<option value='" + v.prod_id+"'> " + v.prod_name+ "</option>";
					})
				}else{
					str += "<option value='0'>데이터 없음</option>";
					$('#result1').empty();
				}
				
				$('#prod').html(str);
				$('#prod').trigger('change');
			},
			error : function(xhr){
				alert("상태 : " + xhr.status);
			},
			dataType : 'json'
		})
	})
	
	$('#prod').on('change', function(){
		var prod_id = $('option:selected', this).val();
		
		if(prod_id != 0){
			$.ajax({
				url : '/jqueryWeb/ProdControllerSW.do',
				data : {"id" : prod_id},
				type : 'post',
				success : function(res){
					str = "<table class='table table-dark table-hover'>";
					str += `
						<tr>
							<td>항목</td>
							<td>내용</td>
						</tr>
						<tr>
							<td>PROD_ID</td>
							<td>${res.prod_id}</td>
						</tr>
						<tr>
							<td>PROD_NAME</td>
							<td>${res.prod_name}</td>
						</tr>
						<tr>
							<td>PROD_LGU</td>
							<td>${res.prod_lgu}</td>
						</tr>
						<tr>
							<td>PROD_BUYER</td>
							<td>${res.prod_buyer}</td>
						</tr>
						<tr>
							<td>PROD_COST</td>
							<td>${res.prod_cost}</td>
						</tr>
						<tr>
							<td>PROD_PRICE</td>
							<td>${res.prod_price}</td>
						</tr>
						<tr>
							<td>PROD_SALE</td>
							<td>${res.prod_sale}</td>
						</tr>
						<tr>
							<td>PROD_OUTLINE</td>
							<td>${res.prod_outline}</td>
						</tr>
						<tr>
							<td>PROD_DETAIL</td>
							<td>${res.prod_detail}</td>
						</tr>
					`;
					
					$('#result1').html(str);
				},
				error : function(xhr){
					alert("상태 : " + xhr.status);
				},
				dataType : 'json'
			})
		}
	})
})
</script>
</head>
<body>

<div id="box">
	<input type="button" id="btn1" value="확인"><br><br>
	<div class="container">
	  	<form>
		    <div class="form-group">
		      <label for="lprod">lprod list</label>
		      <select class="form-control" id="lprod" name="sellist1">
		      </select>
		      <br>
		      <label for="prod">prod select list</label>
		      <select class="form-control" id="prod" name="sellist2">
		      </select>
		    </div>
		</form>
	</div>
	
	<!-- <select id="lprod"></select>
	<select id="prod"></select> -->
	<div id="result1"></div>
</div>
</body>
</html>
