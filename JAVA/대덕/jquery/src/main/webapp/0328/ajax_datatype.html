<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script type="text/javascript">
$(function(){
	var xhr = new XMLHttpRequest();
	
	$('#text').click(function(){
		// 요청
		xhr.open('get', 'text.jsp', true);
		xhr.send();
		
		// 응답
		xhr.onreadystatechange = function(){
			if(this.readyState == 4 && this.status == 200){
				res = this.responseText;
				//res = 홍길동/개나리/진달래/무궁화/라일락/수선화/능소화
				
				arr = res.split("/");
				
				str = "<ul>";
				
				$.each(arr, function(i){
					str += "<li>" + arr[i] + "</li>";
				})
				str += "</ul>";
				
				$('#result1').html(str);
			}
		}
		
	})
	
	$('#jarr').click(function(){
		// 요청
		xhr.open('get', 'jsonArr.jsp', true);
		xhr.send();
		
		// 응답
		xhr.onreadystatechange = function(){
			if(this.readyState == 4 && this.status == 200){
				res = JSON.parse(this.responseText);
				
				str = "<ol>";
				$.each(res, function(i){
					str += "<li>" + res[i] + "</li>";
				})
				str += "</ol>";
				
				$('#result2').html(str);
			}
		}
	})
	
	$('#jobj').click(function(){
		// 요청
		xhr.open('get', 'jsonObj.jsp', true);
		xhr.send();
		
		// 응답
		xhr.onreadystatechange = function(){
			if(this.readyState == 4 && this.status == 200){
				res = JSON.parse(this.responseText);
				
				str = `
					아이디 : ${res.id} <br>
					이름 : ${res.name} <br>
					주소 : ${res.addr} <br>
					전화번호 : ${res.hp}
				`;
				
				$('#result3').html(str);
			}
		}
	})
	
	$('#jobarr').click(function(){
		xhr.open('get', 'jsonObjArr.jsp', true);
		xhr.send();
		
		xhr.onreadystatechange = function(){
			if(this.readyState == 4 && this.status == 200){
				res = JSON.parse(this.responseText);
				
				str = "";
				
				$.each(res, function(i){
					str += `
						${i}번째 회원정보<br>
						아이디 : ${res[i].id}<br>
						이름 : ${res[i].name}<br>
						주소 : ${res[i].addr}<br>
						전화번호 : ${res[i].hp}
						<br><br>
					`;
				})
				
				$('#result4').html(str);
				
			}
		}
	})
	
})
</script>
<style type="text/css">
.box div{
	width: 20%;
	float:left;
	background: pink;
	margin:10px;
}
br{
	clear:both;
}

.box .d1{
	width: 15%;
}

.box .d2{
	width: 25%;
}
</style>
</head>
<body>
<div class="box">
	<input type="button" value="text" id="text">
	<input type="button" value="jsonArr" id="jarr">
	<input type="button" value="jsonObj" id="jobj">
	<input type="button" value="mixData" id="jobarr">
	<br>
	<div id="result1" class="d1"></div>
	<div id="result2" class="d1"></div>
	<div id="result3" class="d2"></div>
	<div id="result4" class="d2"></div>
</div>
</body>
</html>
