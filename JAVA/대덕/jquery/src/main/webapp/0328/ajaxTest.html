<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<link href="../css/public.css">

<script>
	$(function(){
		$('#btn1').on('click', function(){
				
			idvalue = $('#id').val().trim();
			namevalue = $('#name').val().trim();
			
			vform = $('#ff');
			vform.attr('action',
					'first.jsp?id=' + idvalue + '&name=' + namevalue)
			vform.attr('method','get');
			
			vform.submit();
		})
		
		$('#btn2').on('click', function(){
			// 입력한 값 가져오기
			idvalue = $('#id').val().trim();
			namevalue = $('#name').val().trim();
			
			var xhr = new XMLHttpRequest();
			
			// 요청
			xhr.open('get', 'first.jsp?id=' + idvalue + '&name=' + namevalue, true);
			xhr.send();
			
			// 응답 - 이벤트
			xhr.onreadystatechange = function(){
				if(this.readyState == 4 && this.status == 200){
					res = this.responseText;
					$('#result1').html(res);
				}
			}
		})
		
		$('#btn3').on('click',function(){
			// 입력한 값 가져오기
			idvalue = $('#id2').val().trim();
			namevalue = $('#name2').val().trim();
			
			var xhr = new XMLHttpRequest();
			
			// 요청
			xhr.open('post', 'first.jsp',true);
			xhr.setRequestHeader('Content-Type','application/x-www-form-urlencoded');
			//xhr.send("id=" + idvalue + "&name=" + namevalue);
			data = "id=" + idvalue + "&name=" + namevalue;
			xhr.send(data);
			
			// 응답
			xhr.onreadystatechange = function(){
				if(this.readyState == 4 && this.status == 200){
					res = this.responseText;
					$('#result2').html(res);
				}
			}
		})
		
	})
</script>
</head>
<body>

<div class="box">
	<h2>get</h2>
	<form id="ff">
		<label>아이디</label>
		<input type="text" name="id" id="id"><br>
		<label>이름</label>
		<input type="text" name="name" id="name"><br>
		
		<input type="button" value="기본방식" id="btn1">
		<input type="button" value="ajax방식" id="btn2">
	</form>
	<div id="result1">
	
	</div>
	<hr>
	<h2>post</h2>
	<form id="ff2" action="first.jsp" method="post">
		<label>아이디</label>
		<input type="text" name="id" id="id2"><br>
		<label>이름</label>
		<input type="text" name="name" id="name2"><br>
		
		<input type="submit" value="기본의방식" >
		<input type="button" value="ajax" id="btn3">
	</form>
	<div id="result2">
	
	</div>
</div>
</body>
</html>
