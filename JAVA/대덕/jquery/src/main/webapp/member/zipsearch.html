<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<script>
$(function(){
	$('#btn1').click(function(){
		var input = $('#dong').val().trim();
		$.ajax({
			url : '/jqueryWeb/ZipSearch.do',
			type : 'get',
			data : {"dong" : input},
			success : function(res){
				str = "<table class='table table-dark table-hover'>";
				str += "<tr><td>우편번호</td>";
				str += "<td>주소</td>";
				str += "<td>번지</td></tr>";
				
				$.each(res, function(i, v){
					var bunji = v.bunji;
					
					if(typeof bunji == "undefined"){
						bunji = "";
					}
					
					str += "<tr class='ziptr'><td>" + v.zipcode + "</td>";
					str += "<td>" + v.sido + v.gugun + v.dong + "</td>";
					str += "<td>" + bunji + "</td></tr>";
				})
				
				str += "</table>"; 
				
				$('#result1').html(str);
			},
			error : function(xhr){
				alert("상태 : " + xhr.status);
			},
			dataType : 'json'
		})
	})
	
	$('#result1').on('click', '.ziptr', function(){
		zipcode = $('td:eq(0)', this).text();
		addr = $('td:eq(1)', this).text();
		
		$('#zip', opener.document).val(zipcode);
		$('#add1', opener.document).val(addr);
		
		window.close();
	})
})
</script>
<style type="text/css">
#dong{
	margin-left: 20px;
}
#zipform{
	margin: 20px;
}
</style>
</head>
<body>

<div class="box">
 	<div id="zipform">
      <label for="dong">우편번호 검색</label>
      <input type="text" id="dong">
		<input type="button" id="btn1" value="확인">
    </div>
	<div id="result1"></div>
</div>
</body>
</html>
