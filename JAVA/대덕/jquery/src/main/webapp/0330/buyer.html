<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js"></script>
<script>
$(function(){
	$('#btn1').click(function(){
		$.ajax({
			url : '/jqueryWeb/BuyerController.do',
			type : 'get',
			success : function(res){
				str = "";
				
				$.each(res, function(i, v){
					str += "<p id='" + v.id + "'>" + v.name + "</p>";
				})
				
				$('#names').html(str);
			},
			error : function(xhr){
				alert("상태 : " + xhr.status);
			},
			dataType : "json"
		})
	})
	
	$('#names').on('click', 'p', function(){
		idvalue = $(this).attr('id');
		
		$.ajax({
			url : '/jqueryWeb/BuyerController.do',
			data : {"id" : idvalue},
			type : 'post',
			success : function(res){
				str = "<table>";
				
				str += `
					<tr>
						<td>BUYER_ID</td>
						<td>${res.id}</td>
					</tr>	
					<tr>
						<td>BUYER_NAME</td>
						<td>${res.name}</td>
					</tr>	
					<tr>
						<td>BUYER_LGU</td>
						<td>${res.lgu}</td>
					</tr>	
					<tr>
						<td>BUYER_BANK</td>
						<td>${res.bank}</td>
					</tr>	
					<tr>
						<td>BUYER_BANKNO</td>
						<td>${res.bank_no}</td>
					</tr>	
					<tr>
						<td>BUYER_BANKNAME</td>
						<td>${res.bank_name}</td>
					</tr>	
					<tr>
						<td>BUYER_MAIL</td>
						<td>${res.mail}</td>
					</tr>	
					<tr>
						<td>BUYER_ZIP</td>
						<td>${res.zip}</td>
					</tr>	
					<tr>
						<td>BUYER_ADD1</td>
						<td>${res.addr1}</td>
					</tr>	
					<tr>
						<td>BUYER_ADD2</td>
						<td>${res.addr2}</td>
					</tr>	
				`;
				
				str += "</table>";
				
				$('#details').html(str);
			},
			error : function(xhr){
				alert("상태 : " + xhr.status);
			},
			dataType : 'json'
		})
	})
})
</script>
<style type="text/css">
#names p:hover{
	background : darkgray;
}
#names{
	width: 200px;
}
</style>
</head>
<body>

<div id="box">
	<input type="button" id="btn1" value="확인">
	<div id="result1">
		<table class="table table-dark table-hover">
			<tr>
				<td>거래처이름</td>
				<td>거래처상세정보</td>
			</tr>
			<tr>
				<td id="names"></td>
				<td id="details"></td>
			</tr>
		</table>
	</div>
</div>
</body>
</html>
